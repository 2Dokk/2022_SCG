<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2022_SCG</title>
    <style>
        #header{
            display: block;
            border-bottom: solid;
        }
        h1,h2{
            display: inline;
        }
        a{
            text-decoration: none;
            color: rgb(137,143,138);
            margin-left: 6px;
        }
        .middlePicture{
            margin-top: 15px;
            text-align: center;
        }
        .middleContents{
            text-align: center;
            margin-top: 10px;
        }
        #sogangLogo{
            height: 320px;
        }
        #sogangText{
            color: rgb(218,51,51);
        }
        #mainIntro{
            margin-top: 2px;
        }
		.btn {
			background-color: rgb(218,51,51);
			height: 60px;
			width: 170px;
			padding: 15px 30px;
			margin: 10px;
			border: none;
			color: black;
			text-align: center;
			text-decoration: none;
			font-size: 22px;
			display: inline-block;
			cursor: pointer;
			transition: all 0.5s;
		}
		.btn span {
			display: inline-block;
			position: relative;
			transition: 0.5s;
		}
		.btn span::after {
			content: "▶";
			color: white;
			position: absolute;
			top: -2px;
			right: -22px;
			opacity: 0;
			font-size: 30px;
			transition: 0.5s;
		}
		.btn:hover span { padding-right: 30px; }
		.btn:hover span::after {
			opacity: 1;
			right: 0px;
		}
    </style>
</head>
<body>
    <header id="header">
        <h1>서강-맛도리</h1>
        <h2><a href="./intro.html">소개</a></h2>
        <h2><a href="./intro.html">체험하기</a></h2>
    </header>
    <div class="middlePicture">
        <img id="sogangLogo" src="./icon/sogangLogo.jpeg" alt=" ">
    </div>
    <div class="middleContents">
        <h1>Welcome</h1>
        <h1 id="sogangText">&nbsp;Sogang!</h1>
        <h4 id="mainIntro">we are ~~~~introduction</h4>
        <button class="btn"><span>시작하기</span></button>
    </div>
</body>
</html>
